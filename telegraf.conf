[agent]
  flush_interval = "15s"
  interval = "15s"

[[inputs.mqtt_consumer]]
  name_override = "Custom"
  servers = ["tcp://mqtt:1883"]
  qos = 0
  connection_timeout = "30s"
  topics = ["sensors/+/data"]
  client_id = "custom"
  data_format = "json"
  tag_keys = ["sensor_name"]

[[outputs.influxdb]]
  database = "sensorsdata"
  urls = ["http://influxdb:8086"]
  username = "telegraf"
  password = "uforobot"
